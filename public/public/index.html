<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة التخمين الجماعية السينمائية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 650px;
            margin: auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            border: 1px solid #333;
        }
        button {
            background-color: #e50914;
            color: white;
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #b80710;
        }
        .btn-help {
            background-color: #f39c12;
        }
        .btn-help:hover {
            background-color: #d35400;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2b2b2b;
            color: white;
            text-align: center;
            width: 60%;
        }
        .hidden { display: none; }
        .info-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #282828;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
        }
        .timer {
            color: #ff4757;
            font-weight: bold;
        }
        .category {
            color: #2ed573;
            font-weight: bold;
        }
        .image-container {
            margin: 20px 0;
            position: relative;
        }
        img {
            max-width: 100%;
            height: auto;
            max-height: 350px;
            border-radius: 10px;
            border: 2px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 لعبة التخمين 🎮</h1>
    
    <div id="setup-screen">
        <button onclick="createRoom()">صناعة غرفة (Host)</button>
        <br><br>
        <input type="text" id="room-input" placeholder="أدخل رقم الغرفة">
        <button onclick="joinRoom()">انضمام للغرفة</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="info-bar">
            <span id="room-display">رقم الغرفة: --</span>
            <span class="category">الفئة: <span id="category-text">--</span></span>
            <span class="timer">الوقت المتبقي: <span id="timer-text">30</span>ث</span>
        </div>

        <h2 id="round-title">الجولة 1</h2>
        <p id="loading-text">بانتظار الخصم ودخول المعركة...</p>
        
        <div class="image-container">
            <img id="game-image" class="hidden" src="" alt="صورة التخمين">
        </div>
        
        <div id="chat-area" class="hidden">
            <input type="text" id="message-input" placeholder="اكتب تخمينك هنا...">
            <button onclick="sendMessage()">إرسال</button>
            <br>
            <button class="btn-help" onclick="getHelp()">طلب مساعدة 💡</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); 
    let currentRoom = null;
    let timerInterval = null;

    function createRoom() {
        socket.emit('hostCreateRoom');
    }

    function joinRoom() {
        const room = document.getElementById('room-input').value.trim();
        if(room) {
            currentRoom = room;
            socket.emit('playerJoinRoom', room);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }
    }

    socket.on('roomCreated', (roomId) => {
        currentRoom = roomId;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('room-display').innerText = `رقم الغرفة: ${roomId}`;
    });

    socket.on('startRoundData', (data) => {
        document.getElementById('loading-text').classList.add('hidden');
        document.getElementById('chat-area').classList.remove('hidden');
        
        const imgElement = document.getElementById('game-image');
        imgElement.src = data.image; // هنا تم تعديل المتغير ليقرأ الصورة بشكل صحيح بنسبة 100%
        imgElement.classList.remove('hidden');

        document.getElementById('round-title').innerText = `الجولة ${data.round}`;
        document.getElementById('category-text').innerText = data.category;
        
        startTimer();
    });

    function startTimer() {
        clearInterval(timerInterval);
        let timeLeft = 30;
        document.getElementById('timer-text').innerText = timeLeft;
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("انتهى الوقت! انتقل الدور للاعب الآخر.");
            }
        }, 1000);
    }

    function sendMessage() {
        const text = document.getElementById('message-input').value;
        if(text.trim() !== "") {
            socket.emit('gameAction', { action: 'chat', room: currentRoom, text: text });
            document.getElementById('message-input').value = '';
        }
    }

    function getHelp() {
        alert("تلميح المساعدة: الكلمة تبدأ بالحرف الأول من الإجابة المستهدفة!");
    }

    socket.on('receiveMsg', (data) => {
        alert(data.text);
    });
</script>

</body>
</html>
