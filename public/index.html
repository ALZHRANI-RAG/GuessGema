<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة التخمين الجماعية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: white;
            text-align: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 لعبة التخمين 🎮</h1>
    
    <div id="setup-screen">
        <button onclick="createRoom()">صناعة غرفة (Host)</button>
        <br><br>
        <input type="text" id="room-input" placeholder="أدخل رقم الغرفة">
        <button onclick="joinRoom()">انضمام للغرفة</button>
    </div>

    <div id="game-screen" class="hidden">
        <h3 id="room-display"></h3>
        <p id="loading-text">بانتظار الخصم ودخول المعركة...</p>
        <h2 id="round-title"></h2>
        <img id="game-image" src="" alt="صورة التخمين" class="hidden" style="max-width:100%; border-radius:8px; margin:15px 0;">
        
        <div id="chat-area" class="hidden">
            <input type="text" id="message-input" placeholder="اكتب تخمينك هنا...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // الاتصال التلقائي بالسيرفر دون الحاجة لكتابة روابط ثابتة
    const socket = io(); 
    
    let currentRoom = null;

    function createRoom() {
        socket.emit('hostCreateRoom');
    }

    function joinRoom() {
        const room = document.getElementById('room-input').value.trim();
        if(room) {
            currentRoom = room;
            socket.emit('playerJoinRoom', room);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        } else {
            alert('الرجاء إدخال رقم الغرفة أولاً!');
        }
    }

    socket.on('roomCreated', (roomId) => {
        currentRoom = roomId;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('room-display').innerText = `رقم الغرفة: ${roomId}`;
    });

    socket.on('startRoundData', (data) => {
        document.getElementById('loading-text').classList.add('hidden');
        document.getElementById('chat-area').classList.remove('hidden');
        document.getElementById('game-image').classList.remove('hidden');
        document.getElementById('round-title').innerText = `الجولة ${data.round}`;
        document.getElementById('game-image').src = data.p1Image;
    });

    function sendMessage() {
        const text = document.getElementById('message-input').value;
        if(text.trim() !== "") {
            socket.emit('gameAction', { action: 'chat', room: currentRoom, text: text });
            document.getElementById('message-input').value = '';
        }
    }

    socket.on('receiveMsg', (data) => {
        alert("الخصم يقول: " + data.text);
    });
</script>

</body>
</html>
